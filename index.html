<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Levla — Legal</title>
  <meta name="description" content="Legal documents for the Levla iOS app: Privacy Policy and Terms of Use.">
  <style>
    :root {
      --bg: #FAF9F6;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --muted: #555555;
      --line: #E5E3DD;
      --accent: #2F5D50;
      --accent-soft: #EDF3F1;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 56px 20px 80px; }
    .logo { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
    .tagline { color: var(--muted); margin: 8px 0 36px; }
    .links { display: grid; gap: 14px; }
    a.doc {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px 22px;
      transition: border-color .15s ease, transform .05s ease;
    }
    a.doc:hover { border-color: var(--accent); }
    a.doc:active { transform: scale(0.995); }
    a.doc .title { font-size: 19px; font-weight: 600; color: var(--accent); }
    a.doc .sub { color: var(--muted); font-size: 15px; margin-top: 3px; }
    footer { color: var(--muted); font-size: 13px; margin-top: 40px; border-top: 1px solid var(--line); padding-top: 18px; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Levla</div>
    <div class="tagline">Legal &amp; privacy documents</div>
    <div class="links">
      <a class="doc" href="./privacy.html">
        <div class="title">Privacy Policy</div>
        <div class="sub">How Levla collects, uses, and protects your data.</div>
      </a>
      <a class="doc" href="./terms.html">
        <div class="title">Terms of Use (EULA)</div>
        <div class="sub">Subscription terms, medical disclaimer, and license.</div>
      </a>
    </div>
    <footer>
      Questions? <a href="mailto:nyrendito@gmail.com">nyrendito@gmail.com</a> · Last updated June 6, 2026
    </footer>
  </div>
</body>
</html>
